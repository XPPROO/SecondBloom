<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация / Вход</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 400px; margin: auto; }
        .form-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Накидаете тут разметку дальше разберемся</h1>
        <h2>Страница находится по пути /accounts/templates/registerLogin.html</h2>
        <h1>Регистрация / Вход</h1>

        <div class="form-section">
            <h2>Вход</h2>
            <form action="/accounts/login/" method="post">
                {% csrf_token %}
                <label for="login_username">Имя пользователя:</label>
                <input type="text" id="login_username" name="username" required>

                <label for="login_password">Пароль:</label>
                <input type="password" id="login_password" name="password" required>

                <button type="submit">Войти</button>
            </form>
        </div>

        <div class="form-section">
            <h2>Регистрация</h2>
            <form action="/accounts/register/" method="post">
                {% csrf_token %}
                <label for="reg_email">Email:</label>
                <input type="email" id="reg_email" name="email" required>

                <label for="reg_username">Имя пользователя:</label>
                <input type="text" id="reg_username" name="username" required>

                <label for="reg_password">Пароль:</label>
                <input type="password" id="reg_password" name="password" required>

                <label for="reg_confirm_password">Подтвердите пароль:</label>
                <input type="password" id="reg_confirm_password" name="confirm_password" required>

                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>
</body>
</html>
